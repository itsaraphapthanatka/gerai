# แทนที่ location blocks เดิมใน server block ของ geo.appreview.cloud (ตัว 443 ที่ certbot จัดการ)
# ด้วยบล็อกนี้ — เก็บบรรทัด listen 443 ssl / ssl_certificate ที่ certbot ใส่ไว้ตามเดิม
# GEO เป็น FastAPI ตัวเดียว → ใช้แค่ location / ไม่ต้องมี /api/ หรือ /_next/

    location / {
        proxy_pass http://127.0.0.1:8095;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location ~ /\.ht {
        deny all;
    }
