<!doctype html>
<html lang="{{ lang }}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ meta_title }}</title>
<meta name="description" content="{{ meta_desc }}">
<link rel="canonical" href="{{ canonical }}">
<meta property="og:title" content="{{ meta_title }}">
<meta property="og:description" content="{{ meta_desc }}">
<meta property="og:type" content="article">
<meta property="og:url" content="{{ canonical }}">
{% for s in schemas %}<script type="application/ld+json">{{ s | safe }}</script>
{% endfor %}
<style>
  :root { color-scheme: light }
  body { font-family: 'IBM Plex Sans Thai', system-ui, -apple-system, sans-serif;
    max-width: 760px; margin: 0 auto; padding: 40px 22px; line-height: 1.75;
    color: #1c1c2b; background: #fff; }
  h1 { font-size: 30px; line-height: 1.25; margin: 0 0 18px; }
  h2 { font-size: 21px; margin: 1.7em 0 .5em; }
  h3 { font-size: 17px; margin: 1.4em 0 .4em; }
  p, li { font-size: 16px; }
  ul { padding-left: 22px; }
  a { color: #7132f5; }
  article { margin-bottom: 40px; }
  footer { border-top: 1px solid #ececf1; padding-top: 16px; color: #6b6b7b; font-size: 13px; }
</style>
</head>
<body>
<article>
  <h1>{{ title }}</h1>
  {{ body_html | safe }}
</article>
<footer>
  เนื้อหาโดย <strong>{{ brand_name }}</strong> · <a href="{{ site_url }}">{{ domain }}</a>
</footer>
</body>
</html>
